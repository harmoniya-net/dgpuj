name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
          - { os: windows-latest, target: aarch64-pc-windows-msvc, experimental: true }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: macos-latest,   target: x86_64-apple-darwin }
    # arm64-windows cross-link may be unavailable on the runner; never block the release on it.
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      # Package the binary into an archive so extraction restores the +x bit on
      # Unix (consumers like @opys/dgpuj extract a single file). .zip on Windows
      # (Compress/7z), .tar.gz elsewhere; the binary sits at the archive root.
      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          out="$PWD/dist/dgpuj-${{ matrix.target }}"
          cd "target/${{ matrix.target }}/release"
          if [ -f dgpuj.exe ]; then
            7z a "$out.zip" dgpuj.exe >/dev/null
          else
            tar -czf "$out.tar.gz" dgpuj
          fi
      - uses: actions/upload-artifact@v5
        with:
          name: dgpuj-${{ matrix.target }}
          path: dist/dgpuj-*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dgpuj-*
          generate_release_notes: true
          fail_on_unmatched_files: true
