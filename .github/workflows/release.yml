name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   ext: .exe }
          - { os: windows-latest, target: aarch64-pc-windows-msvc,  ext: .exe, experimental: true }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu, ext: '' }
          - { os: macos-latest,   target: aarch64-apple-darwin,     ext: '' }
          - { os: macos-latest,   target: x86_64-apple-darwin,      ext: '' }
    # arm64-windows cross-link may be unavailable on the runner; never block the release on it.
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/dgpuj${{ matrix.ext }}" "dist/dgpuj-${{ matrix.target }}${{ matrix.ext }}"
      - uses: actions/upload-artifact@v5
        with:
          name: dgpuj-${{ matrix.target }}
          path: dist/dgpuj-*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dgpuj-*
          generate_release_notes: true
          fail_on_unmatched_files: true
